<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title> Controles de Formulário </title>
</head>
<body>
    <form action="index.html" method="GET">
        <h1> Preferências </h1>
        <label for="nome"> NOME: </label>
        <input type="text" name="nome" id="nome">
        <br><br>
        
        <p> Qual turno você prefere estudar? </p>
        <input type="radio" name="turno" id="manha">
        <label for="manha"> Manhã </label>
        <br>
        <input type="radio" name="turno" id="tarde">
        <label for="tarde"> Tarde </label>
        <br>
        <input type="radio" id="noite" name="turno">
        <label for="noite"> Noite </label>
        <br><br>
        
        <p> Quais áreas da tecnologia você tem interesse? </p>
        <input type="checkbox" id="programa" name="tecnologia">
        <label for="programa"> Programação </label>
        <br>
        <input type="checkbox" id="desing" name="tecnologia">
        <label for="desing"> Desing </label>
        <br>
        <input type="checkbox" id="bd" name="tecnologia">
        <label for="bd"> Banco de Dados </label>
        <br>
        <input type="checkbox" id="rede" name="tecnologia">
        <label for="rede"> Redes </label>
        <br><br>
        
        <label for="cor"> Qual sua cor favorita? </label>
        <input type="color" id="cor" name="cor">
        <br><br>
        
        <label for="nivel"> Qual seu nível de satisfação? </label>
        <input type="range" id="nivel" name="nivel">
        <br><br>
        
        <label for="tempo"> Qual seu horário preferido? </label>
        <input type="time" id="tempo" name="tempo">
        <br><br>
        
        <label for="arquivo"> Envie um arquivo </label>
        <input type="file" id="arquivo" name="arquivor">
        <br><br>
        
        <input type="submit" value="Cadastrar">
        <input type="reset" value="Limpar">
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <title> Formulário HTML </title> <!--certo-->
    <meta charset="UTF-8">
  </head> <!--certo-->

  <body>
    <h1> Cadastro de Usuário</h1> <!--certo-->
    <form action="cadastro.php" method="GET"> <!--certo-->
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome"> <!--certo-->
      <br>
      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email"> <!--certo-->
      <br>
      <label for="senha">Senha:</label>
      <input type="password" id="senha" name="senha"> <!--certo-->
      <br>
      <label for="idade">Idade:</label>
      <input type="number" id="idade" name="idade">
      <br>
      <label for="nascimento">Data de nascimento:</label> <!--certo-->
      <input type="date" id="nascimento" name="nascimento"> <!--certo-->
      <br>
      <p> Turno:</p>
      <input type="radio" name="turno" id="manha"> <label for="manha">Manhã:</label>
      <input type="radio" name="turno" id="tarde"> <label for="tarde">Tarde:</label> <!--certo--> <!--certo-->
      <input type="radio" name="turno" id="noite"> <label for="noite">Noite:</label>
      <br>
      <p> Áreas de interesse:</p>
      <input type="checkbox" name="area" id="programacao"> <label for="programacao">Programação:</label>
      <input type="checkbox" name="area" id="design"> <label for="design">Design:</label>
      <input type="checkbox" name="area" id="redes"> <label for="redes">Redes:</label> <!--certo-->
      <br>
      <input type="submit" value="Enviar"> <!--certo-->
      <input type="reset" value="Limpar"> <!--certo-->
    </form>
  </body>
</html>
